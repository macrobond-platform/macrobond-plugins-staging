name: Create release

# Triggered whenever a PR is merged into main.
# Reads the version from plugins/macrobond/plugin.json, zips the plugin
# contents, and creates a GitHub release tagged vX.Y.Z.
# Skips if the tag already exists (i.e. this version was already released).

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release and ZIP
    runs-on: ubuntu-24.04
    if: github.event.pull_request.merged == true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Read version from plugin manifest
        id: version
        run: |
          set -euo pipefail
          version=$(jq -r '.version' plugins/macrobond/plugin.json)
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Could not parse semver from plugin.json: '$version'"
            exit 1
          fi
          echo "version=$version"                     >> "$GITHUB_OUTPUT"
          echo "tag=v${version}"                      >> "$GITHUB_OUTPUT"
          echo "zip=macrobond-plugin-${version}.zip"  >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create ZIP
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          zip -r "${{ steps.version.outputs.zip }}" \
            plugins/ \
            .claude-plugin/ \
            .github/plugin/ \
            LICENCE \
            README.md
          echo "Created ${{ steps.version.outputs.zip }} ✓"

      - name: Create GitHub release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.version.outputs.zip }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "See [README](https://github.com/macrobond-platform/macrobond-plugins#readme) for install instructions."
          echo "Release ${{ steps.version.outputs.tag }} created ✓"
